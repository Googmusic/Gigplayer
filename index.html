<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gig Player</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
}

#topbar {
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

button {
  font-size:22px;
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
}

#songTitle {
  text-align:center;
  margin-top:80px;
  font-size:28px;
  color:#ffaa00;
}

#sections {
  text-align:center;
}

#song {
  padding:15px;
  font-size:30px;
  line-height:1.6;
}

.chord { color:#00ffcc; font-weight:bold; }
.section { color:#ffaa00; margin-top:15px; }
</style>
</head>

<body>

<div id="topbar">
  <button onclick="prevSong()">⏮</button>
  <button onclick="nextSong()">⏭</button>
  <button onclick="toggleScroll()">▶</button>
  <button onclick="stopScroll()">⏹</button>
</div>

<div id="songTitle"></div>
<div id="sections"></div>
<div id="song"></div>

<script>
let songs = [
{
name:"Demo Song",
content:`[Verse]
G D Em C
This is your gig app

[Chorus]
C G D Em
Play your songs with ease`
},
{
name:"Second Song",
content:`[Verse]
D A Bm G
Another song here

[Chorus]
G D A
Sing it loud`
}
];

let current = 0;
let scroll;

function displaySong() {
  let song = songs[current];
  document.getElementById("songTitle").innerText = song.name;

  let html = "";
  let sections = [];

  song.content.split("\n").forEach(line=>{
    if(line.startsWith("[")) {
      html += `<div class="section">${line}</div>`;
      sections.push(line);
    }
    else if(line.match(/^[A-G]/)) {
      html += `<div class="chord">${line}</div>`;
    }
    else {
      html += `<div>${line}</div>`;
    }
  });

  document.getElementById("song").innerHTML = html;

  // build section buttons
  let secHtml = "";
  sections.forEach(sec=>{
    secHtml += `<button onclick="jumpTo('${sec}')">${sec}</button>`;
  });
  document.getElementById("sections").innerHTML = secHtml;
}

function jumpTo(section){
  let els = document.querySelectorAll("#song div");
  els.forEach(el=>{
    if(el.innerText === section){
      el.scrollIntoView({behavior:"smooth"});
    }
  });
}

function nextSong(){
  if(current < songs.length-1){ current++; displaySong(); }
}

function prevSong(){
  if(current > 0){ current--; displaySong(); }
}

function toggleScroll(){
  scroll = setInterval(()=> window.scrollBy(0,2), 50);
}

function stopScroll(){
  clearInterval(scroll);
}

displaySong();
</script>

</body>
</html>
